<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMAV Studio — AI Video Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --bg-panel: #111119;
    --bg-input: #161624;
    --bg-card: #141422;
    --bg-hover: #1c1c30;
    --border: rgba(255,255,255,0.05);
    --border-active: rgba(99,102,241,0.5);
    --text: #eeeef4;
    --text-dim: #9090a8;
    --text-faint: #5a5a72;
    --blue: #6366f1;
    --blue-soft: rgba(99,102,241,0.1);
    --blue-glow: rgba(99,102,241,0.25);
    --teal: #14b8a6;
    --teal-soft: rgba(20,184,166,0.1);
    --pink: #ec4899;
    --green: #22c55e;
    --green-soft: rgba(34,197,94,0.1);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-pill: 100px;
    --shadow: 0 8px 32px rgba(0,0,0,0.25);
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    -webkit-font-smoothing: antialiased;
    background-image: 
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(236,72,153,0.04) 0%, transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.3); }
  input, textarea, select, button { font-family: inherit; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0}to{opacity:1} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)} }
  @keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
  @keyframes breathe { 0%,100%{box-shadow:0 0 20px rgba(99,102,241,0.15)}50%{box-shadow:0 0 35px rgba(99,102,241,0.3)} }
  @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }
  @keyframes borderGlow { 0%,100%{border-color:rgba(99,102,241,0.2)}50%{border-color:rgba(99,102,241,0.5)} }

  .fade-up { animation: fadeUp .5s cubic-bezier(0.16,1,0.3,1) both; }
  .fade-in { animation: fadeIn .4s ease both; }

  /* Glass panels */
  .glass-panel {
    background: linear-gradient(180deg, rgba(17,17,25,0.95), rgba(17,17,25,0.85));
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid var(--border);
  }

  /* Inputs with glow */
  .input-glow {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.8;
    outline: none;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .input-glow:focus { 
    border-color: var(--blue); 
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12), 0 4px 16px rgba(99,102,241,0.08);
    background: rgba(22,22,36,0.9);
  }
  .input-glow::placeholder { color: var(--text-faint); }

  /* Buttons */
  .btn-primary {
    border: none;
    background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 3s ease infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.35); }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-outline {
    background: transparent;
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--blue);
    font-weight: 700;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative;
  }
  .btn-outline:hover { 
    border-color: var(--blue); 
    background: rgba(99,102,241,0.06);
    box-shadow: 0 4px 16px rgba(99,102,241,0.12);
  }
  .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.12); color: var(--text); background: rgba(255,255,255,0.02); }

  /* Option cards */
  .opt-card {
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }
  .opt-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .opt-card:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .opt-card.active { transform: translateY(-1px); }

  /* Scene cards */
  .scene-card {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    cursor: pointer;
    position: relative;
  }
  .scene-card:hover { 
    border-color: rgba(99,102,241,0.3);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    transform: translateY(-2px);
  }
  .scene-card.editing {
    border-color: var(--blue);
    box-shadow: 0 8px 28px rgba(99,102,241,0.2);
  }

  /* Tags */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    backdrop-filter: blur(8px);
  }

  /* Section labels */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* Filmstrip */
  .filmstrip-item {
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .filmstrip-item:hover { border-color: rgba(99,102,241,0.3); }
  .filmstrip-item.active { 
    border-color: var(--blue); 
    box-shadow: 0 4px 16px rgba(99,102,241,0.2);
  }

  /* Video player frame */
  .video-frame {
    background: var(--bg-card);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.02) inset;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* Nav bar */
  .nav-bar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,18,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* Chip template buttons */
  .chip-btn {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  .chip-btn:hover { 
    border-color: rgba(99,102,241,0.3); 
    color: var(--text);
    background: rgba(99,102,241,0.04);
    transform: translateY(-1px);
  }

  /* Play button overlay */
  .play-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(99,102,241,0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 8px 28px rgba(99,102,241,0.4);
    animation: breathe 3s ease-in-out infinite;
  }
  .play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 36px rgba(99,102,241,0.5);
  }

  /* Image reference upload area */
  .upload-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border-radius: 12px;
    border: 1px dashed rgba(99,102,241,0.2);
    background: transparent;
    color: var(--text-faint);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .upload-area:hover { 
    border-color: rgba(99,102,241,0.4); 
    background: rgba(99,102,241,0.03);
    color: var(--text-dim);
  }

  /* Narration subtitle overlay */
  .narration-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.92));
    padding: 32px 24px 20px;
  }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const DEFAULT_CONFIG = {

/* ─── Icons ─── */
const I={

  vol:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14"/></svg>,
  img:()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>,
};

function Spin({s=16}){return <div style={{width:s,height:s,border:"2px solid rgba(255,255,255,0.1)",borderTopColor:"var(--blue)",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>}

/* ─── Config Modal ─── */
function ConfigModal({config,setConfig,onSave}){
  const[l,setL]=useState(config);const[t,setT]=useState(false);const[st,setSt]=useState("");
  const test=async()=>{setT(true);setSt("...");try{await supaFetch(l,"scenes?limit=1");setSt("ok")}catch(e){setSt("err:"+e.message.substring(0,50))}setT(false)};
  const fields=[{k:"supabaseUrl",l:"Supabase URL",p:"https://xxxxx.supabase.co"},{k:"supabaseKey",l:"Supabase Key",p:"eyJhbGci..."},{k:"n8nWebhook",l:"n8n Webhook",p:"https://..."}];
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,backdropFilter:"blur(20px)"}}>
      <div className="fade-up" style={{background:"linear-gradient(180deg,rgba(17,17,25,0.97),rgba(17,17,25,0.92))",backdropFilter:"blur(32px)",WebkitBackdropFilter:"blur(32px)",border:"1px solid rgba(99,102,241,0.1)",borderRadius:24,padding:36,maxWidth:440,width:"92%",boxShadow:"0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:28}}>
          <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,rgba(99,102,241,0.2),rgba(99,102,241,0.08))",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--blue)",boxShadow:"0 4px 16px rgba(99,102,241,0.15)"}}><I.film/></div>
          <div><div style={{fontSize:20,fontWeight:800,letterSpacing:-.5,background:"linear-gradient(135deg,#fff,#a5b4fc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ALMAV Studio</div><div style={{fontSize:11,color:"var(--text-faint)",marginTop:2}}>Configuración de conexión</div></div>
        </div>
        {fields.map(f=>(
          <div key={f.k} style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",letterSpacing:.5,textTransform:"uppercase",display:"block",marginBottom:5}}>{f.l}</label>
            <input value={l[f.k]||""} onChange={e=>setL({...l,[f.k]:e.target.value})} placeholder={f.p}

        {st&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:12,fontWeight:500,background:st==="ok"?"var(--green-soft)":st.startsWith("err")?"rgba(239,68,68,.1)":"rgba(255,255,255,.03)",color:st==="ok"?"var(--green)":st.startsWith("err")?"#ef4444":"var(--text-dim)"}}>{st==="ok"?"✓ Conectado":"✗ "+st.slice(4)}</div>}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={test} disabled={t} className="btn-ghost" style={{flex:1,padding:"11px",fontSize:12,fontWeight:600}}>{t?"⏳":"🔌"} Test</button>
          <button onClick={()=>{setConfig(l);onSave(l)}} className="btn-primary" style={{flex:2,padding:"11px",fontSize:13}}>Guardar y Continuar</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Stepper ─── */
function Stepper({current}){
  const steps=["Prompt","Storyboard","Video","Export"];
  return(
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      {steps.map((s,i)=>{const n=i+1;const a=n===current;const d=n<current;return(
        <React.Fragment key={n}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,
              background:a?"var(--blue)":d?"var(--green-soft)":"var(--bg-input)",color:a?"#fff":d?"var(--green)":"var(--text-faint)",
              border:a?"none":`1px solid ${d?"rgba(34,197,94,.3)":"var(--border)"}`,transition:"all .3s"}}>{d?<I.check/>:n}</div>
            <span style={{fontSize:11,fontWeight:600,color:a?"var(--text)":"var(--text-faint)",display:a?"block":"none"}}>{s}</span>
          </div>
          {n<4&&<div style={{width:16,height:1,background:d?"rgba(34,197,94,.3)":"var(--border)"}}/>}
        </React.Fragment>
      )})}
    </div>
  );
}

/* ─── Screen 1: Prompt ─── */
function Screen1({onGenerate,loading,statusMsg}){
  const[script,setScript]=useState("");

    {id:"slideRight",label:"Slide Right",icon:"▶"},

  const transList=[

    {id:"dissolve",label:"Dissolve",icon:"✨"},

    {id:"slideLeft",label:"Slide L",icon:"📱"},
    {id:"slideRight",label:"Slide R",icon:"📲"},

/* ─── Screen 2: Storyboard ─── */
function Screen2({scenes,config,onNext,onBack,refreshScenes,setScenes}){
  const[sel,setSel]=useState(new Set());
  const[regenPrompt,setRegenPrompt]=useState("");
  const[regenLoading,setRegenLoading]=useState(false);
  const[regenStatus,setRegenStatus]=useState("");
  const[editScene,setEditScene]=useState(null);
  const[originalPrompts]=useState(()=>{
    const map={};
    scenes.forEach(s=>{map[s.id]=s.prompt_image});
    return map;
  });
  const toggleSel=id=>{const s=new Set(sel);s.has(id)?s.delete(id):s.add(id);setSel(s)};

  const regenerateImage = async (sceneId) => {
    if(!regenPrompt.trim()) return;
    setRegenLoading(true);
    setRegenStatus("Actualizando prompt...");
    
    const scene = scenes.find(s => s.id === sceneId);
    if(!scene) { setRegenLoading(false); return; }

    // Usar siempre el prompt ORIGINAL + corrección nueva (no acumular)
    const basePrompt = originalPrompts[sceneId] || scene.prompt_image.split('. CRITICAL MODIFICATION:')[0];
    const newPrompt = `${basePrompt}. CRITICAL MODIFICATION: ${regenPrompt}. Keep everything else exactly the same.`;
    const oldImage = scene.image_url;
    
    try {
      // 1. Actualizar prompt_image y cambiar status a "pending"
      await supaFetch(config, `scenes?id=eq.${sceneId}`, {
        method: "PATCH",
        body: JSON.stringify({ 
          prompt_image: newPrompt, 
          status: "pending",
          image_url: null
        })
      });

      // 2. Llamar webhook para que n8n ejecute Fase 2
      setRegenStatus("Enviando a n8n...");
      try {
        await fetch(config.n8nWebhook, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chatInput: "regenerate", mode: "regenerate" })
        });
      } catch(e) {}

      // 3. Poll hasta que n8n genere la nueva imagen
      setRegenStatus("Regenerando imagen...");
      let attempts = 0;
      while(attempts < 40) {
        await new Promise(r => setTimeout(r, 3000));
        try {
          const data = await supaFetch(config, `scenes?id=eq.${sceneId}`);
          if(data && data[0]) {
            if(data[0].status === "image_ready" && data[0].image_url) {
              setRegenStatus("¡Imagen regenerada!");
              await refreshScenes();
              setTimeout(() => setRegenStatus(""), 3000);
              setRegenLoading(false);
              setRegenPrompt("");
              return;
            }
          }
        } catch(e) {}
        attempts++;
        setRegenStatus(`Regenerando... ${Math.min(Math.round(attempts/40*100),95)}%`);
      }
      
      // Timeout - restaurar
      setRegenStatus("Timeout. Restaurando...");
      await supaFetch(config, `scenes?id=eq.${sceneId}`, {
        method: "PATCH",
        body: JSON.stringify({ image_url: oldImage, status: "image_ready" })
      });
      await refreshScenes();
      setRegenStatus("No se pudo regenerar. Intenta de nuevo.");
    } catch(e) {
      setRegenStatus("Error: " + e.message);
    }
    setRegenLoading(false);
    setRegenPrompt("");
    setTimeout(() => setRegenStatus(""), 4000);
  };

  return(
    <div className="fade-up" style={{display:"flex",minHeight:"calc(100vh - 52px)"}}>
      {/* Sidebar */}
      <div style={{width:260,borderRight:"1px solid var(--border)",padding:20,background:"var(--bg-panel)",flexShrink:0,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Escenas</div>
        {scenes.map(s=>(
          <div key={s.id} onClick={()=>{toggleSel(s.id);setEditScene(editScene===s.id?null:s.id)}} style={{padding:"10px",borderRadius:8,marginBottom:4,background:editScene===s.id?"var(--blue-soft)":sel.has(s.id)?"rgba(99,102,241,0.06)":"transparent",border:`1px solid ${editScene===s.id?"var(--border-active)":sel.has(s.id)?"rgba(99,102,241,0.15)":"transparent"}`,cursor:"pointer",transition:'all .2s'}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:600,color:editScene===s.id?"var(--blue)":"var(--text-dim)"}}>Scene {s.scene_number}</span>
              <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:s.status==="image_ready"?"var(--green-soft)":"rgba(255,255,255,.03)",color:s.status==="image_ready"?"var(--green)":"var(--text-faint)",fontWeight:600}}>{s.status==="image_ready"?"Ready":s.status}</span>
            </div>
            <p style={{fontSize:10,color:"var(--text-faint)",marginTop:4,lineHeight:1.4}}>{(s.narration_text||"").substring(0,60)}...</p>
          </div>
        ))}

        {/* Regenerate panel */}
        {editScene && (
          <div style={{marginTop:12,padding:12,background:"var(--bg-input)",borderRadius:10,border:"1px solid var(--border)"}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--blue)",letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>✏️ Corregir Escena {scenes.find(s=>s.id===editScene)?.scene_number}</div>
            
            {/* Current image preview */}
            {scenes.find(s=>s.id===editScene)?.image_url && (
              <div style={{borderRadius:6,overflow:"hidden",marginBottom:8,aspectRatio:"16/9"}}>
                <img src={scenes.find(s=>s.id===editScene).image_url} style={{width:"100%",height:"100%",objectFit:"cover",opacity:.7}}/>
              </div>
            )}

            <textarea value={regenPrompt} onChange={e=>setRegenPrompt(e.target.value)}
              placeholder="Describe qué quieres cambiar... ej: 'Que sea de noche', 'Agrega lluvia', 'Cambia los colores a tonos fríos'"
              style={{width:"100%",height:70,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:10,color:"var(--text)",fontSize:11,resize:"none",outline:"none",lineHeight:1.5}}
              onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.06)"}/>
            
            <button onClick={()=>regenerateImage(editScene)} disabled={regenLoading||!regenPrompt.trim()}
              style={{width:"100%",marginTop:8,padding:"9px",borderRadius:8,border:"none",
                background:regenLoading?"var(--bg-hover)":"var(--blue)",color:regenLoading?"var(--text-dim)":"#fff",
                fontSize:11,fontWeight:700,cursor:regenLoading?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {regenLoading?<><Spin s={12}/> Generando...</>:"🎨 Regenerar Imagen"}
            </button>
            
            {regenStatus&&<div style={{marginTop:6,fontSize:10,color:regenStatus.includes("Error")?"#ef4444":regenStatus.includes("!")?"var(--green)":"var(--blue)",textAlign:"center"}}>{regenStatus}</div>}
          </div>
        )}

        <div style={{marginTop:"auto",paddingTop:12,display:"flex",flexDirection:"column",gap:6}}>
          <button onClick={onBack} style={{padding:"9px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--text-dim)",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><I.back/> Volver</button>
        </div>
      </div>

      {/* Main area */}
      <div style={{flex:1,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800,letterSpacing:-.3}}>Storyboard</h2>
            <p style={{fontSize:12,color:"var(--text-dim)",marginTop:2}}>{scenes.length} escenas · Click en una escena para editar</p>
          </div>
          <button onClick={onNext} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"var(--blue)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>Generar Video <I.arrow/></button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(scenes.length,4)},1fr)`,gap:14}}>
          {scenes.map(sc=>(
            <div key={sc.id} className="fade-up">
              <div onClick={()=>{toggleSel(sc.id);setEditScene(editScene===sc.id?null:sc.id)}} style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"16/9",border:editScene===sc.id?"2px solid var(--blue)":sel.has(sc.id)?"1.5px solid rgba(99,102,241,0.4)":"1px solid var(--border)",cursor:"pointer",transition:"all .3s",boxShadow:editScene===sc.id?"0 4px 16px var(--blue-glow)":"none"}}>
                {sc.image_url?<img src={sc.image_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:
                <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg-input)",color:"var(--text-faint)"}}><I.img/></div>}
                {editScene===sc.id&&<div style={{position:"absolute",top:6,right:6,padding:"3px 8px",borderRadius:4,background:"var(--blue)",fontSize:9,fontWeight:700,color:"#fff"}}>Editando</div>}
                {sel.has(sc.id)&&editScene!==sc.id&&<div style={{position:"absolute",top:6,right:6,width:20,height:20,borderRadius:"50%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center"}}><I.check/></div>}
              </div>
              <div style={{marginTop:6}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,fontWeight:700,color:editScene===sc.id?"var(--blue)":"var(--text-dim)"}}>E{sc.scene_number}</span>
                  <button onClick={(e)=>{e.stopPropagation();setEditScene(sc.id);setRegenPrompt("")}} 
                    style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid var(--border)",background:"transparent",color:"var(--text-faint)",cursor:"pointer"}}
                    onMouseOver={e=>{e.target.style.borderColor="var(--blue)";e.target.style.color="var(--blue)"}}
                    onMouseOut={e=>{e.target.style.borderColor="rgba(255,255,255,0.06)";e.target.style.color="var(--text-faint)"}}>✏️ Editar</button>
                </div>
                <p style={{fontSize:10,color:"var(--text-faint)",lineHeight:1.4,marginTop:2}}>{(sc.narration_text||"").substring(0,70)}...</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── Screen 3: Video ─── */
function Screen3({scenes,config,onNext,onBack,onVideoReady}){
  const[cur,setCur]=useState(0);const[gen,setGen]=useState(false);const[url,setUrl]=useState(null);const[prog,setProg]=useState("");
  const genVideo=async()=>{
    setGen(true);setProg("Buscando video...");
    try{
      const ex=scenes.find(s=>s.video_url);if(ex){setUrl(ex.video_url);onVideoReady(ex.video_url);setGen(false);setProg("");return}
      const ck=await supaFetch(config,"scenes?video_url=not.is.null&limit=1");
      if(ck&&ck.length>0&&ck[0].video_url){setUrl(ck[0].video_url);onVideoReady(ck[0].video_url);setGen(false);setProg("");return}
      setProg("Esperando render...");let a=0;
      while(a<60){await new Promise(r=>setTimeout(r,4000));try{
        const d=await supaFetch(config,"scenes?select=video_url,status&order=scene_number.asc");
        if(d&&d.length>0){const v=d.find(s=>s.video_url);if(v){setUrl(v.video_url);onVideoReady(v.video_url);setProg("");setGen(false);return}}
      }catch(e){}a++;setProg(`Procesando... ${Math.min(Math.round(a/50*100),95)}%`)}
      setProg("Timeout — revisa n8n");
    }catch(e){setProg("Error: "+e.message)}setGen(false)};

  return(
    <div className="fade-up" style={{display:"flex",minHeight:"calc(100vh - 52px)"}}>
      <div style={{width:220,borderRight:"1px solid var(--border)",padding:20,background:"var(--bg-panel)",flexShrink:0,display:"flex",flexDirection:"column"}}>
        <button onClick={onBack} style={{padding:"9px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--text-dim)",fontSize:11,fontWeight:600,cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><I.back/> Volver</button>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text-faint)",letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Timeline</div>
        {scenes.map((s,i)=>(
          <div key={s.id} onClick={()=>setCur(i)} style={{padding:"8px 10px",borderRadius:8,marginBottom:3,background:cur===i?"var(--blue-soft)":"transparent",border:`1px solid ${cur===i?"var(--border-active)":"transparent"}`,color:cur===i?"var(--blue)":"var(--text-faint)",fontSize:11,fontWeight:500,cursor:"pointer",transition:'all .2s'}}>
            Scene {s.scene_number}
          </div>
        ))}
        <div style={{marginTop:"auto"}}>
          <button onClick={genVideo} disabled={gen} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:url?"var(--green)":"var(--blue)",color:"#fff",fontSize:12,fontWeight:700,cursor:gen?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {gen?<><Spin s={14}/> Procesando...</>:url?"✓ Video Listo":<><I.film/> Crear Video</>}
          </button>
          {prog&&<div style={{fontSize:10,color:"var(--blue)",marginTop:6,textAlign:"center"}}>{prog}</div>}
          {url&&<button onClick={onNext} style={{width:"100%",marginTop:6,padding:"10px",borderRadius:10,border:"none",background:"var(--blue)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Exportar →</button>}
        </div>
      </div>
      <div style={{flex:1,padding:28}}>
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
          {scenes.map((s,i)=>(
            <div key={s.id} onClick={()=>setCur(i)} style={{width:90,aspectRatio:"16/9",borderRadius:8,overflow:"hidden",flexShrink:0,border:cur===i?"2px solid var(--blue)":"1px solid var(--border)",cursor:"pointer",opacity:cur===i?1:.5,transition:"all .3s"}}>
              <img src={s.image_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>
          ))}
        </div>
        <div style={{background:"var(--bg-card)",borderRadius:14,overflow:"hidden",border:"1px solid var(--border)",position:"relative",aspectRatio:"16/9",maxHeight:460}}>
          {url?<video src={url} controls style={{width:"100%",height:"100%",objectFit:"contain"}}/>:(
            <>{scenes[cur]?.image_url&&<img src={scenes[cur].image_url} style={{width:"100%",height:"100%",objectFit:"cover",transition:"all .4s"}}/>}
              {scenes[cur]?.narration_text&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.9))",padding:"28px 20px 16px"}}><p style={{color:"#fff",fontSize:13,textAlign:"center",lineHeight:1.6}}>{scenes[cur].narration_text}</p></div>}
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div onClick={genVideo} style={{width:56,height:56,borderRadius:"50%",background:"rgba(99,102,241,.8)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",backdropFilter:"blur(8px)",boxShadow:"0 8px 24px var(--blue-glow)"}}><I.play/></div></div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── Screen 4: Export ─── */
function Screen4({scenes,videoUrl,onBack}){
  const[sp,setSp]=useState(false);
  const[copied,setCopied]=useState(false);
  const speak=()=>{if(!window.speechSynthesis)return;setSp(true);const t=scenes.map(s=>s.narration_text).filter(Boolean).join(". ");const u=new SpeechSynthesisUtterance(t);u.lang="es-ES";u.rate=.9;u.onend=()=>setSp(false);window.speechSynthesis.speak(u)};
  const dlSRT=()=>{let s="";scenes.forEach((sc,i)=>{const st=i*5;const en=st+5;const f=sec=>`${String(Math.floor(sec/3600)).padStart(2,"0")}:${String(Math.floor(sec%3600/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")},000`;s+=`${i+1}\n${f(st)} --> ${f(en)}\n${sc.narration_text||""}\n\n`});const b=new Blob([s],{type:"text/srt"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="subtitulos.srt";a.click()};
  
  const shareUrl = videoUrl || window.location.href;
  const shareText = "Mira este video generado con IA en ALMAV Studio";
  
  const shareFB = () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}&quote=${encodeURIComponent(shareText)}`, '_blank', 'width=600,height=400');
  const shareX = () => window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`, '_blank', 'width=600,height=400');
  const shareWA = () => window.open(`https://wa.me/?text=${encodeURIComponent(shareText + " " + shareUrl)}`, '_blank');
  const shareTG = () => window.open(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`, '_blank');
  const shareLI = () => window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`, '_blank', 'width=600,height=400');
  const copyLink = () => { navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)}); };

  return(

        <button onClick={speak} disabled={sp} className="btn-ghost" style={{width:"100%",padding:"9px",fontSize:11,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>🔊 {sp?"Reproduciendo...":"Escuchar narración"}</button>

        <div style={{fontSize:10,fontWeight:700,color:"var(--text-faint)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Compartir</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <button onClick={shareFB} disabled={!videoUrl} style={{padding:"10px",borderRadius:8,border:"1px solid rgba(24,119,242,0.2)",background:"rgba(24,119,242,0.06)",color:"#1877F2",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(24,119,242,0.12)"} onMouseOut={e=>e.currentTarget.style.background="rgba(24,119,242,0.06)"}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
          <button onClick={shareX} disabled={!videoUrl} style={{padding:"10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"var(--text)",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"} onMouseOut={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X
          </button>
          <button onClick={shareWA} disabled={!videoUrl} style={{padding:"10px",borderRadius:8,border:"1px solid rgba(37,211,102,0.2)",background:"rgba(37,211,102,0.06)",color:"#25D366",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(37,211,102,0.12)"} onMouseOut={e=>e.currentTarget.style.background="rgba(37,211,102,0.06)"}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </button>
          <button onClick={shareTG} disabled={!videoUrl} style={{padding:"10px",borderRadius:8,border:"1px solid rgba(0,136,204,0.2)",background:"rgba(0,136,204,0.06)",color:"#0088CC",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(0,136,204,0.12)"} onMouseOut={e=>e.currentTarget.style.background="rgba(0,136,204,0.06)"}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#0088CC"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
          </button>
        </div>
        
        {/* LinkedIn */}
        <button onClick={shareLI} disabled={!videoUrl} className="btn-ghost" style={{width:"100%",padding:"9px",fontSize:11,marginBottom:6,display:"flex",alignItems:"center",gap:8,color:"#0A66C2"}}
          onMouseOver={e=>e.currentTarget.style.background="rgba(10,102,194,0.06)"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </button>
        
        {/* Copy link */}
        <button onClick={copyLink} disabled={!videoUrl} className="btn-ghost" style={{width:"100%",padding:"9px",fontSize:11,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          {copied ? "✅ Link copiado!" : "🔗 Copiar link del video"}
        </button>
        
        <div style={{marginTop:"auto"}}>
          <button onClick={()=>videoUrl&&window.open(videoUrl,"_blank")} disabled={!videoUrl}
            className="btn-primary" style={{width:"100%",padding:"13px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <I.dl/> Exportar MP4

      <div style={{flex:1,padding:28}}>

        <div className="video-frame" style={{maxWidth:780}}>
          {videoUrl?<video src={videoUrl} controls style={{width:"100%",display:"block"}}/>:
          <div style={{aspectRatio:"16/9",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-faint)",fontSize:12}}>Genera el video en la pantalla anterior</div>}
        </div>

            {scenes.map(s=>(
              <div key={s.id} style={{padding:12,borderRadius:10,background:"var(--bg-card)",border:"1px solid var(--border)",fontSize:11,color:"var(--text-dim)",lineHeight:1.6}}>
                <span style={{color:"var(--blue)",fontWeight:700,fontSize:10,display:"block",marginBottom:4}}>Scene {s.scene_number}</span>{s.narration_text||"—"}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App(){
  const[screen,setScreen]=useState(1);const[scenes,setScenes]=useState([]);const[videoUrl,setVideoUrl]=useState(null);
  const[showCfg,setShowCfg]=useState(false);const[loading,setLoading]=useState(false);
  const[config,setConfig]=useState(DEFAULT_CONFIG);const cfgRef=useRef(config);const[statusMsg,setStatusMsg]=useState("");
  useEffect(()=>{cfgRef.current=config},[config]);

  const fetchScenes=async()=>{const c=cfgRef.current;try{const d=await supaFetch(c,"scenes?order=scene_number.asc");if(d)setScenes(d);const v=d?.find(s=>s.video_url);if(v)setVideoUrl(v.video_url)}catch(e){}};

  const handleGenerate=async(chatInput,numScenes,aspect,style,voiceId,mode,animation,transition)=>{
    const c=cfgRef.current;if(!c.supabaseUrl||!c.n8nWebhook){alert("Falta configuración.");return}
    setLoading(true);setStatusMsg("Limpiando...");
    try{
      try{await supaFetch(c,"scenes?scene_number=gt.0",{method:"DELETE"})}catch(e){}
      await new Promise(r=>setTimeout(r,1000));setStatusMsg("Enviando a la IA...");
      try{await fetch(c.n8nWebhook,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chatInput,voiceId:voiceId||"",mode:mode||"video",animation:animation||"zoomIn",transition:transition||"fade"})})}catch(e){}
      await new Promise(r=>setTimeout(r,5000));setStatusMsg("Generando escenas...");
      let att=0,found=[];
      while(att<60){await new Promise(r=>setTimeout(r,3000));try{
        const d=await supaFetch(c,"scenes?order=scene_number.asc");
        if(d&&d.length>0){found=d;const wi=d.filter(s=>s.status==="image_ready");
          setStatusMsg(`Escenas: ${d.length}/${numScenes} · Imágenes: ${wi.length}/${numScenes}`);
          if(wi.length>=numScenes||(att>20&&d.length>=numScenes)){setScenes(d);setStatusMsg("");setScreen(2);setLoading(false);return}}
      }catch(e){}att++}
      if(found.length>0){setScenes(found);setScreen(2)}else alert("No se generaron escenas. Revisa n8n.");
    }catch(e){alert("Error: "+e.message)}setLoading(false);setStatusMsg("")};

  const onCfgSave=async c=>{setShowCfg(false);try{const d=await supaFetch(c,"scenes?order=scene_number.asc");if(d?.length>0){setScenes(d);const v=d.find(s=>s.video_url);if(v)setVideoUrl(v.video_url);setScreen(2)}}catch(e){}};

  return(
    <div style={{background:"var(--bg)",minHeight:"100vh"}}>
      {showCfg&&<ConfigModal config={config} setConfig={setConfig} onSave={onCfgSave}/>}
      <nav className="nav-bar">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:9,background:"linear-gradient(135deg,rgba(99,102,241,0.2),rgba(99,102,241,0.08))",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--blue)",boxShadow:"0 2px 8px rgba(99,102,241,0.12)"}}><I.film/></div>
          <span style={{fontSize:16,fontWeight:800,letterSpacing:-.4,background:"linear-gradient(135deg,#fff,#a5b4fc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ALMAV</span>
          <span style={{fontSize:11,color:"var(--text-faint)",fontWeight:400}}>Studio</span>
        </div>
        <div style={{flex:1,display:"flex",justifyContent:"center"}}><Stepper current={screen}/></div>
        <button onClick={()=>setShowCfg(true)} className="btn-ghost" style={{padding:"6px 12px",borderRadius:8,fontSize:11,display:"flex",alignItems:"center",gap:5}}><I.gear/> Config</button>
      </nav>
      {screen===1&&<Screen1 onGenerate={handleGenerate} loading={loading} statusMsg={statusMsg}/>}
      {screen===2&&<Screen2 scenes={scenes} config={config} onNext={()=>setScreen(3)} onBack={()=>setScreen(1)} refreshScenes={fetchScenes} setScenes={setScenes}/>}
      {screen===3&&<Screen3 scenes={scenes} config={config} onNext={()=>setScreen(4)} onBack={()=>setScreen(2)} onVideoReady={u=>setVideoUrl(u)}/>}
      {screen===4&&<Screen4 scenes={scenes} videoUrl={videoUrl} onBack={()=>setScreen(3)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
